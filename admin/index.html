<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <h1>Admin Panel</h1>
        <p class="login-sub">Sign in to manage your academic site</p>
        <form id="login-form">
          <label>Email</label>
          <input type="email" id="login-email" value="admin@admin.com" required />
          <label>Password</label>
          <input type="password" id="login-password" value="admin123" required />
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          <p id="login-error" class="error-msg"></p>
        </form>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-layout" style="display:none;">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h2>Admin</h2>
          <a href="/" target="_blank" class="view-site-link">View Site ↗</a>
        </div>
        <nav class="sidebar-nav">
          <a href="#" data-page="dashboard" class="nav-item active">Dashboard</a>
          <a href="#" data-page="profile" class="nav-item">Profile</a>
          <a href="#" data-page="sections" class="nav-item">Sections</a>
          <a href="#" data-page="publications" class="nav-item">Publications</a>
          <a href="#" data-page="events" class="nav-item">Events</a>
        </nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
        </div>
      </aside>

      <div class="admin-main">
        <header class="admin-header">
          <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
          <h3 id="page-title">Dashboard</h3>
        </header>

        <div class="admin-content" id="admin-content">
          <!-- Content loaded dynamically -->
        </div>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
